name: CI

# Quality gate for the whole project. Every push and pull request targeting `main`
# must pass before changes are trusted. The pipeline is intentionally modular: each
# concern is its own job so future milestones can add jobs (frontend, build, deploy)
# without rewriting existing ones.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # --- Quality gates, run in order; the job stops at the first failure. ---

      - name: Ruff (lint + import order)
        run: ruff check .

      - name: Black (formatting check only)
        run: black --check .

      - name: mypy (strict type check)
        run: mypy app

      - name: pytest (backend test suite)
        run: pytest

  # Future jobs plug in here without touching the backend job, e.g.:
  #
  #   frontend:
  #     name: Frontend quality gates
  #     runs-on: ubuntu-latest
  #     defaults: { run: { working-directory: frontend } }
  #     steps: [...]
  #
  #   build / deploy jobs can declare `needs: [backend, frontend]` to gate on green checks.
