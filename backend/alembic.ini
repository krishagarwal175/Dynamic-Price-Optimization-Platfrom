# Alembic configuration. The database URL is intentionally left blank here and resolved
# at runtime in alembic/env.py from the application's typed settings (DATABASE_URL), so
# there is a single source of truth for the connection string.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set programmatically in env.py (do not hard-code it here).

[post_write_hooks]
# Keep generated migrations consistent with the project's formatting/linting.
hooks = black,ruff
black.type = console_scripts
black.entrypoint = black
black.options = REVISION_SCRIPT_FILENAME
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
