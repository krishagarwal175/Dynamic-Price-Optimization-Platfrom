# Render Blueprint — PricingLab API (FastAPI) + managed PostgreSQL.
#
# Deploy: push to GitHub, then in Render → New → Blueprint → pick this repo. Render reads
# this file, provisions the database and the web service, and wires DATABASE_URL. After the
# first deploy, set CORS_ALLOWED_ORIGINS to your Vercel URL (below), then redeploy.
services:
  - type: web
    name: pricinglab-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pricinglab-db
          property: connectionString
      - key: FILE_STORAGE_PATH
        value: /tmp/storage
      # Set this to your deployed frontend origin (comma-separated for several).
      # A "*" wildcard is rejected because credentialed CORS is enabled.
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: pricinglab-db
    plan: free
    databaseName: pricinglab
