# Render Blueprint — PricingLab API (FastAPI) on an EXTERNAL PostgreSQL (e.g. Supabase).
# No Render-managed database is declared, so no credit card is required. You can also just
# use "New → Web Service" in the Render dashboard instead of this Blueprint.
#
# After the first deploy, set the two `sync: false` variables in the Render dashboard:
#   DATABASE_URL          — your Supabase connection string (Session pooler, postgresql://…)
#   CORS_ALLOWED_ORIGINS  — your frontend origin, e.g. https://your-app.vercel.app
services:
  - type: web
    name: pricinglab-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: FILE_STORAGE_PATH
        value: /tmp/storage
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
